name: Test

on:
  push:
    branches:
      - dev
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        target:
          - x86_64
          - aarch64
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: 0.10.2
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies and run pytest
        run: |
          uv sync --extra gym --extra pettingzoo --extra torch
          uv run pytest
